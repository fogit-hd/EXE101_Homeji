<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Homie house icon  organic bezier silhouette (not geometric primitives) -->
  <defs>
    <linearGradient id="roofGrad" x1="96" y1="80" x2="416" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00C853"/>
      <stop offset="1" stop-color="#008C3A"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="140" y1="200" x2="380" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F0EBE3"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="220" y1="300" x2="292" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3AA8C5"/>
      <stop offset="1" stop-color="#1F7A96"/>
    </linearGradient>
  </defs>

  <!-- Soft ground shadow -->
  <ellipse cx="256" cy="448" rx="118" ry="18" fill="#00331A" opacity="0.12"/>

  <!-- Body  rounded organic house body -->
  <path fill="url(#bodyGrad)" d="
    M148 232
    C148 208 168 196 196 192
    L316 192
    C344 196 364 208 364 232
    L364 392
    C364 416 348 432 320 436
    L192 436
    C164 432 148 416 148 392
    Z"/>

  <!-- Roof  soft curved peak with overhang -->
  <path fill="url(#roofGrad)" d="
    M96 228
    C112 168 168 112 256 96
    C344 112 400 168 416 228
    C404 236 388 240 372 236
    L256 168
    L140 236
    C124 240 108 236 96 228
    Z"/>

  <!-- Chimney  rounded stack -->
  <path fill="#00B14F" d="
    M318 118
    C318 108 326 100 338 100
    L358 100
    C370 100 378 108 378 118
    L378 168
    C378 176 372 182 364 182
    L332 182
    C324 182 318 176 318 168
    Z"/>

  <!-- Smoke puff -->
  <path fill="#D9EEF5" opacity="0.85" d="
    M348 78
    C360 66 378 70 382 86
    C396 84 406 98 396 110
    C390 122 368 124 358 114
    C348 120 336 110 340 96
    C336 86 340 80 348 78
    Z"/>

  <!-- Left window (eye) -->
  <ellipse cx="204" cy="268" rx="28" ry="32" fill="#FFFFFF"/>
  <ellipse cx="204" cy="270" rx="14" ry="16" fill="#1F2428"/>
  <ellipse cx="198" cy="262" rx="5" ry="6" fill="#FFFFFF" opacity="0.9"/>

  <!-- Right window (eye) -->
  <ellipse cx="308" cy="268" rx="28" ry="32" fill="#FFFFFF"/>
  <ellipse cx="308" cy="270" rx="14" ry="16" fill="#1F2428"/>
  <ellipse cx="302" cy="262" rx="5" ry="6" fill="#FFFFFF" opacity="0.9"/>

  <!-- Soft cheeks -->
  <ellipse cx="176" cy="312" rx="16" ry="10" fill="#FF9B8F" opacity="0.55"/>
  <ellipse cx="336" cy="312" rx="16" ry="10" fill="#FF9B8F" opacity="0.55"/>

  <!-- Arched door -->
  <path fill="url(#doorGrad)" d="
    M220 420
    L220 348
    C220 318 236 300 256 300
    C276 300 292 318 292 348
    L292 420
    Z"/>
  <circle cx="278" cy="372" r="6" fill="#F4C430"/>

  <!-- Soft smile -->
  <path d="M232 336 C244 348 268 348 280 336" stroke="#2A3036" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Tiny feet -->
  <path fill="#00B14F" d="
    M178 430
    C178 444 196 452 214 446
    C220 444 222 438 220 432
    Z"/>
  <path fill="#00B14F" d="
    M292 432
    C290 438 292 444 298 446
    C316 452 334 444 334 430
    Z"/>
</svg>
