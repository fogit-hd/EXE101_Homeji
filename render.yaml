# Render Blueprint — prefer Static Site for this Vite SPA.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: exe101-homeji
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
